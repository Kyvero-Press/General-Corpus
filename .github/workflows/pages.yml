name: Deploy corpus viewer to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/pages.yml
      - viewer/**
      - scripts/build-corpus-viewer-catalog.py
      - scripts/validate-lineage-manifests.py
      - scripts/validate-work-metadata-manifests.py
      - manifests/**
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: viewer/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.13'

      - name: Install PDF inspection tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends poppler-utils

      - name: Resolve approved publication release
        shell: bash
        run: |
          snapshot_date="$(python3 -c 'import json; print(json.load(open("manifests/publication-set/viewer-default.json", encoding="utf-8"))["snapshot_date"])')"
          if [[ ! "$snapshot_date" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "Invalid publication snapshot date: $snapshot_date" >&2
            exit 1
          fi
          release_tag="publication-set-$snapshot_date"
          echo "PUBLICATION_RELEASE_TAG=$release_tag" >> "$GITHUB_ENV"
          echo "PUBLICATION_PDF_BASE_URL=https://github.com/$GITHUB_REPOSITORY/releases/download/$release_tag" >> "$GITHUB_ENV"

      - name: Verify approved publication release is public
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          read -r is_draft is_immutable published_at < <(
            gh release view "$PUBLICATION_RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --json isDraft,isImmutable,publishedAt \
              --jq '[.isDraft, .isImmutable, (.publishedAt // "")] | @tsv'
          )
          if [[ "$is_draft" != "false" || "$is_immutable" != "true" || -z "$published_at" ]]; then
            echo "Publication release $PUBLICATION_RELEASE_TAG must be published and immutable." >&2
            exit 1
          fi

      - name: Download approved publication PDFs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist
          gh release download "$PUBLICATION_RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern '*.pdf' \
            --dir dist

      - name: Install viewer dependencies
        working-directory: viewer
        run: npm ci

      - name: Test viewer
        working-directory: viewer
        run: npm test

      - name: Build Pages site
        working-directory: viewer
        run: npm run build:pages

      - name: Verify Pages artifact excludes publication PDFs
        run: |
          if [[ -e build/corpus-viewer/site/publication-pdfs ]]; then
            echo 'Pages output must link to release PDFs, not copy them.' >&2
            exit 1
          fi

      - name: Upload static site artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: corpus-viewer-site
          path: build/corpus-viewer/site
          if-no-files-found: error
          retention-days: 1
          compression-level: 9

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    steps:
      - name: Download static site artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: corpus-viewer-site
          path: site

      - name: Check out deployment branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: gh-pages
          path: deployment

      - name: Publish deployment branch
        run: |
          rsync --archive --delete --exclude .git site/ deployment/
          touch deployment/.nojekyll
          cd deployment
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add --all
          if git diff --cached --quiet; then
            echo 'The published site is already current.'
            exit 0
          fi
          git commit --message "Deploy corpus viewer from $GITHUB_SHA"
          git push origin HEAD:gh-pages

      - name: Request GitHub Pages build
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api --method POST "repos/$GITHUB_REPOSITORY/pages/builds"

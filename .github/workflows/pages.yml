name: Deploy corpus viewer to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/pages.yml
      - viewer/**
      - scripts/build-corpus-viewer-catalog.py
      - scripts/validate-lineage-manifests.py
      - scripts/validate-work-metadata-manifests.py
      - manifests/**
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: viewer/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.13'

      - name: Install PDF inspection tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends poppler-utils

      - name: Resolve approved publication release
        shell: bash
        run: |
          snapshot_date="$(python3 -c 'import json; print(json.load(open("manifests/publication-set/viewer-default.json", encoding="utf-8"))["snapshot_date"])')"
          if [[ ! "$snapshot_date" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "Invalid publication snapshot date: $snapshot_date" >&2
            exit 1
          fi
          release_tag="publication-set-$snapshot_date"
          echo "PUBLICATION_RELEASE_TAG=$release_tag" >> "$GITHUB_ENV"
          echo "PUBLICATION_PDF_BASE_URL=https://github.com/$GITHUB_REPOSITORY/releases/download/$release_tag" >> "$GITHUB_ENV"

      - name: Verify approved publication release is public
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          read -r is_draft is_immutable published_at < <(
            gh release view "$PUBLICATION_RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --json isDraft,isImmutable,publishedAt \
              --jq '[.isDraft, .isImmutable, (.publishedAt // "")] | @tsv'
          )
          if [[ "$is_draft" != "false" || "$is_immutable" != "true" || -z "$published_at" ]]; then
            echo "Publication release $PUBLICATION_RELEASE_TAG must be published and immutable." >&2
            exit 1
          fi

      - name: Download approved publication PDFs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist
          gh release download "$PUBLICATION_RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern '*.pdf' \
            --dir dist

      - name: Install viewer dependencies
        working-directory: viewer
        run: npm ci

      - name: Test viewer
        working-directory: viewer
        run: npm test

      - name: Build Pages site
        working-directory: viewer
        run: npm run build:pages

      - name: Verify Pages artifact excludes publication PDFs
        run: |
          if [[ -e build/corpus-viewer/site/publication-pdfs ]]; then
            echo 'Pages output must link to release PDFs, not copy them.' >&2
            exit 1
          fi

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: build/corpus-viewer/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
